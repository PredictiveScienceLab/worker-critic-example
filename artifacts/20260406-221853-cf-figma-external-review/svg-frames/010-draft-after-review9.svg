  <text x="70" y="64" fill="#12324A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="0"><tspan x="70" dy="0">Physics-informed Bayesian reconstruction of cardiovascular hemodynamics</tspan></text>
  <text x="70" y="118" fill="#536B80" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" letter-spacing="0"><tspan x="70" dy="0">Objective: recover patient-specific flow fields and cardiac structure, with uncertainty, from multimodal cardiovascular imaging.</tspan></text>

