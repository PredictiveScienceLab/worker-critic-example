  <text x="1026" y="440" fill="#536B80" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" letter-spacing="0"><tspan x="1026" dy="0">multimodal imaging + co-registration</tspan></text>
  <rect x="584" y="504" width="784" height="74" rx="20" fill="#12324A" stroke="none" stroke-width="1" filter="url(#shadow)" />
  <text x="610" y="533" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="600" letter-spacing="0"><tspan x="610" dy="0">Joint posterior from multimodal imaging, without repeated CFD solves.</tspan></text>

