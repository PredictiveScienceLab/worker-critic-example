  <text x="1444" y="242" fill="#12324A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="0"><tspan x="1444" dy="0">What the project delivers</tspan></text>
  
  <rect x="1444" y="292" width="190" height="144" rx="18" fill="#EEF5FB" stroke="#D8E2EC" stroke-width="1" filter="url(#shadow)" />
  <rect x="1462" y="310" width="34" height="10" rx="5" fill="#2F7DB6" stroke="none" stroke-width="1" />
  <text x="1462" y="340" fill="#12324A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="0"><tspan x="1462" dy="0">Recovered</tspan><tspan x="1462" dy="22">quantities</tspan></text>
  <text x="1462" y="370" fill="#536B80" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="400" letter-spacing="0"><tspan x="1462" dy="0">velocity</tspan><tspan x="1462" dy="23">pressure</tspan><tspan x="1462" dy="23">wall shear stress</tspan><tspan x="1462" dy="23">structure</tspan></text>

  
  <rect x="1658" y="292" width="208" height="144" rx="18" fill="#FFF5E7" stroke="#D8E2EC" stroke-width="1" filter="url(#shadow)" />
