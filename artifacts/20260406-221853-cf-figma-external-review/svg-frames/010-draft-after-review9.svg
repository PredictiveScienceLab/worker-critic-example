  <text x="84" y="242" fill="#12324A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="0"><tspan x="84" dy="0">Imaging is informative but</tspan><tspan x="84" dy="28">incomplete.</tspan></text>
  
