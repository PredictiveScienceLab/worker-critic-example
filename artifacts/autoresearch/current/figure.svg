<text x="70" y="112" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#0F172A" text-anchor="start">Worker-Critic Pattern</text>
<text x="70" y="166" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="400" fill="#334155" text-anchor="start"><tspan x="70" dy="0">A worker drafts, a critic reviews, feedback loops back into revision, and the</tspan><tspan x="70" dy="34">process stops only on approval.</tspan></text>
