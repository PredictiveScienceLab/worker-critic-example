<text x="138" y="494" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#274C77" text-anchor="start">Makes the next draft</text>
<text x="138" y="526" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#3B82F6" text-anchor="start"><tspan x="138" dy="0">Keeps the task and</tspan><tspan x="138" dy="24">context alive</tspan></text>
